<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Flashcards</h1>
            <select id="set-selector">
                <option value="" disabled selected>Select a set...</option>
                </select>
        </header>

        <div class="stats">
            Cards left to study: <span id="cards-left">0</span>
        </div>

        <div class="flashcard-container" id="flashcard-container" style="display: none;">
            <div class="flashcard" id="flashcard">
                <div class="front" id="card-front">Card front</div>
                <div class="back" id="card-back">Card back</div>
            </div>
        </div>

        <div class="controls" id="controls" style="display: none;">
            <div class="action-buttons">
                <button id="btn-know" class="success">Know</button>
                <button id="btn-dont-know" class="danger">Don't know</button>
            </div>
            <div class="extra-controls">
                <button id="btn-shuffle" title="Shuffle set">🔀</button>
                <button id="btn-reset" title="Reset progress">🔄</button>
            </div>
        </div>

        <div id="message" class="message">Select a set to start.</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
